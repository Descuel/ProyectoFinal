<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Equipos por Laboratorio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background: #1e3a5f; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .volver { background: white; color: #1e3a5f; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .contenedor { padding: 30px; }
        .card-item { cursor: pointer; transition: 0.2s; margin-bottom: 20px; }
        .card-item:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .nivel-titulo { font-size: 1.8rem; margin: 20px 0; color: #1e3a5f; border-left: 5px solid #1e3a5f; padding-left: 15px; }
        .breadcrumb { background: white; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; }
        .btn-crud { margin: 5px; }
        .table-equipos th { background-color: #1e3a5f; color: white; }
        .form-equipo { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-equipo input, .form-equipo select { margin-bottom: 10px; }
    </style>
</head>
<body>
<nav class="navbar-custom">
    <div class="logo"><i class="fas fa-tools"></i> Gestión de Equipos (Admin)</div>
    <button class="volver" onclick="window.location.href='/dashboard'">Volver </button>
</nav>
<main class="contenedor">
    <div class="breadcrumb" id="breadcrumb">
        <span class="fw-bold">Navegación:</span> <span id="rutaActual">Edificios</span>
    </div>
    <div id="contenidoPrincipal">
        <div class="text-center"><div class="spinner-border text-primary"></div><p>Cargando edificios...</p></div>
    </div>
</main>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    // Estado de navegación
    let estado = {
        edificio: null,
        laboratorio: null
    };

    // Funciones auxiliares
    async function fetchData(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
    }

    function mostrarCargando() {
        document.getElementById('contenidoPrincipal').innerHTML = `<div class="text-center"><div class="spinner-border text-primary"></div><p>Cargando...</p></div>`;
    }

    function mostrarMensaje(mensaje, esError = false) {
        const div = document.createElement('div');
        div.className = `alert alert-${esError ? 'danger' : 'success'} alert-dismissible fade show`;
        div.role = 'alert';
        div.innerHTML = `${mensaje} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
        document.getElementById('contenidoPrincipal').prepend(div);
        setTimeout(() => div.remove(), 3000);
    }

    function actualizarBreadcrumb() {
        let texto = '';
        if (estado.edificio) texto += `Edificio: ${estado.edificio.nombre} > `;
        if (estado.laboratorio) texto += `Laboratorio: ${estado.laboratorio.nombre} > `;
        if (!estado.laboratorio && !estado.edificio) texto = 'Edificios';
        document.getElementById('rutaActual').innerText = texto || 'Inicio';
    }

    // ========== NIVEL 1: MOSTRAR EDIFICIOS ==========
    async function mostrarEdificios() {
        mostrarCargando();
        try {
            const edificios = await fetchData('/edificios');
            if (!edificios.length) {
                document.getElementById('contenidoPrincipal').innerHTML = '<div class="alert alert-warning">No hay edificios registrados.</div>';
                return;
            }
            let html = '<h2 class="nivel-titulo"><i class="fas fa-building"></i> Seleccione un edificio</h2><div class="row">';
            edificios.forEach(ed => {
                html += `
                    <div class="col-md-4 col-sm-6">
                        <div class="card card-item" onclick="seleccionarEdificio(${ed.id}, '${ed.nombre}')">
                            <div class="card-body text-center">
                                <i class="fas fa-building fa-3x mb-3"></i>
                                <h5>${ed.nombre}</h5>
                                <p class="text-muted">${ed.direccion || 'Sin dirección'}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('contenidoPrincipal').innerHTML = html;
            estado.edificio = null;
            estado.laboratorio = null;
            actualizarBreadcrumb();
        } catch (err) {
            document.getElementById('contenidoPrincipal').innerHTML = `<div class="alert alert-danger">Error al cargar edificios: ${err.message}</div>`;
        }
    }

    // ========== NIVEL 2: MOSTRAR LABORATORIOS DE UN EDIFICIO ==========
    window.seleccionarEdificio = async (id, nombre) => {
        estado.edificio = { id, nombre };
        estado.laboratorio = null;
        mostrarCargando();
        try {
            // Obtener todos los pisos y luego laboratorios
            const pisos = await fetchData('/pisos');
            const pisosEdificio = pisos.filter(p => p.edificio_id == id);
            if (!pisosEdificio.length) {
                document.getElementById('contenidoPrincipal').innerHTML = `<div class="alert alert-info">El edificio "${nombre}" no tiene pisos registrados.</div>`;
                actualizarBreadcrumb();
                return;
            }
            const laboratorios = await fetchData('/laboratorios');
            const labsEdificio = laboratorios.filter(lab => pisosEdificio.some(p => p.id === lab.piso_id));
            if (!labsEdificio.length) {
                document.getElementById('contenidoPrincipal').innerHTML = `<div class="alert alert-info">El edificio "${nombre}" no tiene laboratorios.</div>`;
                actualizarBreadcrumb();
                return;
            }
            let html = `<h2 class="nivel-titulo"><i class="fas fa-flask"></i> Laboratorios del edificio ${nombre}</h2><div class="row">`;
            labsEdificio.forEach(lab => {
                html += `
                    <div class="col-md-4 col-sm-6">
                        <div class="card card-item" onclick="seleccionarLaboratorio(${lab.id}, '${lab.nombre}')">
                            <div class="card-body">
                                <h5><i class="fas fa-flask"></i> ${lab.nombre}</h5>
                                <p>Capacidad: ${lab.capacidad} | Equipos: ${lab.num_equipos}</p>
                                <p class="text-muted">${lab.especialidad || 'Sin especialidad'}</p>
                                <span class="badge ${lab.estado === 'disponible' ? 'bg-success' : 'bg-secondary'}">${lab.estado}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('contenidoPrincipal').innerHTML = html;
            actualizarBreadcrumb();
        } catch (err) {
            document.getElementById('contenidoPrincipal').innerHTML = `<div class="alert alert-danger">Error al cargar laboratorios: ${err.message}</div>`;
        }
    };

    // ========== NIVEL 3: MOSTRAR EQUIPOS DE UN LABORATORIO CON CRUD ==========
    window.seleccionarLaboratorio = async (labId, nombreLab) => {
        estado.laboratorio = { id: labId, nombre: nombreLab };
        mostrarCargando();
        try {
            const equipos = await fetchData('/equipos');
            const equiposLab = equipos.filter(eq => eq.laboratorio_id == labId);
            // Formulario para crear equipo
            let html = `
                <div class="form-equipo" id="formEquipo" style="display:none;">
                    <h4>Agregar equipo a ${nombreLab}</h4>
                    <input type="text" id="codigo" class="form-control" placeholder="Código (ej: PC-101-01)" required>
                    <input type="text" id="tipo" class="form-control" placeholder="Tipo">
                    <input type="text" id="marca" class="form-control" placeholder="Marca">
                    <input type="text" id="modelo" class="form-control" placeholder="Modelo">
                    <select id="estado" class="form-control">
                        <option value="operativo">Operativo</option>
                        <option value="mantenimiento">Mantenimiento</option>
                        <option value="dañado">Dañado</option>
                    </select>
                    <button class="btn btn-primary" onclick="crearEquipo(${labId})">Guardar</button>
                    <button class="btn btn-secondary" onclick="ocultarFormulario()">Cancelar</button>
                </div>
                <button class="btn btn-success mb-3" onclick="mostrarFormulario()"><i class="fas fa-plus"></i> Agregar Equipo</button>
                <h2 class="nivel-titulo">💻 Equipos del laboratorio ${nombreLab}</h2>
            `;
            if (equiposLab.length === 0) {
                html += `<div class="alert alert-info">No hay equipos registrados en este laboratorio.</div>`;
            } else {
                html += `
                    <table class="table table-bordered table-hover">
                        <thead class="table-equipos">
                            <tr><th>ID</th><th>Código</th><th>Tipo</th><th>Marca</th><th>Modelo</th><th>Estado</th><th>Acciones</th></tr>
                        </thead>
                        <tbody>
                `;
                equiposLab.forEach(eq => {
                    html += `
                        <tr>
                            <td>${eq.id}</td>
                            <td>${eq.codigo}</td>
                            <td>${eq.tipo || '-'}</td>
                            <td>${eq.marca || '-'}</td>
                            <td>${eq.modelo || '-'}</td>
                            <td>${eq.estado}</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="editarEquipo(${eq.id})">Editar</button>
                                <button class="btn btn-danger btn-sm" onclick="eliminarEquipo(${eq.id})">Eliminar</button>
                            </td>
                        </tr>
                    `;
                });
                html += `</tbody></table>`;
            }
            document.getElementById('contenidoPrincipal').innerHTML = html;
            actualizarBreadcrumb();
        } catch (err) {
            document.getElementById('contenidoPrincipal').innerHTML = `<div class="alert alert-danger">Error al cargar equipos: ${err.message}</div>`;
        }
    };

    // Funciones CRUD para equipos
    window.mostrarFormulario = () => {
        document.getElementById('formEquipo').style.display = 'block';
    };
    window.ocultarFormulario = () => {
        document.getElementById('formEquipo').style.display = 'none';
        document.getElementById('codigo').value = '';
        document.getElementById('tipo').value = '';
        document.getElementById('marca').value = '';
        document.getElementById('modelo').value = '';
        document.getElementById('estado').value = 'operativo';
    };
    window.crearEquipo = async (labId) => {
        const data = {
            codigo: document.getElementById('codigo').value,
            laboratorio_id: labId,
            tipo: document.getElementById('tipo').value,
            marca: document.getElementById('marca').value,
            modelo: document.getElementById('modelo').value,
            estado: document.getElementById('estado').value
        };
        if (!data.codigo) return mostrarMensaje('El código es obligatorio', true);
        try {
            const res = await fetch('/equipos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (res.ok) {
                mostrarMensaje('Equipo creado correctamente');
                ocultarFormulario();
                seleccionarLaboratorio(labId, estado.laboratorio.nombre);
            } else {
                mostrarMensaje(result.mensaje || 'Error al crear', true);
            }
        } catch (err) {
            mostrarMensaje('Error de conexión', true);
        }
    };
    window.editarEquipo = async (id) => {
        const nuevoCodigo = prompt('Nuevo código:');
        if (!nuevoCodigo) return;
        const nuevoEstado = prompt('Nuevo estado (operativo/mantenimiento/dañado):');
        if (!nuevoEstado) return;
        try {
            // Obtener el equipo actual para mantener otros campos
            const equipos = await fetchData('/equipos');
            const eq = equipos.find(e => e.id == id);
            if (!eq) return;
            const data = {
                codigo: nuevoCodigo,
                laboratorio_id: eq.laboratorio_id,
                tipo: eq.tipo,
                marca: eq.marca,
                modelo: eq.modelo,
                estado: nuevoEstado
            };
            const res = await fetch(`/equipos/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (res.ok) {
                mostrarMensaje('Equipo actualizado');
                seleccionarLaboratorio(estado.laboratorio.id, estado.laboratorio.nombre);
            } else {
                mostrarMensaje(result.mensaje, true);
            }
        } catch (err) {
            mostrarMensaje('Error', true);
        }
    };
    window.eliminarEquipo = async (id) => {
        if (!confirm('¿Eliminar este equipo?')) return;
        try {
            const res = await fetch(`/equipos/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const result = await res.json();
            if (res.ok) {
                mostrarMensaje('Equipo eliminado');
                seleccionarLaboratorio(estado.laboratorio.id, estado.laboratorio.nombre);
            } else {
                mostrarMensaje(result.mensaje, true);
            }
        } catch (err) {
            mostrarMensaje('Error', true);
        }
    };

    // Iniciar
    mostrarEdificios();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
