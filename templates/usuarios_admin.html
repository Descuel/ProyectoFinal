<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/edificios.css') }}">
    <style>
        .mensaje-flotante {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            z-index: 1000;
            display: none;
        }
        .mensaje-error { background: #f44336; }
        .modal-header-custom { background: #1e3a5f; color: white; }
        .btn-cambiar-pw { background-color: #ff9800; color: white; border: none; }
        .btn-cambiar-pw:hover { background-color: #e68900; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo">Sistema de Laboratorios</div>
    <button class="volver" onclick="window.location.href='/dashboard'">Volver</button>
</nav>
<main class="contenedor">
    <section class="titulo">
        <h1>Gestión de Usuarios</h1>
        <p>Administrar cuentas de estudiantes, docentes y administradores.</p>
    </section>
    <div id="mensaje" class="mensaje-flotante"></div>
    <section class="tabla" id="tablaUsuarios">
        <div class="text-center">Cargando usuarios...</div>
    </section>
</main>

<!-- Modal Editar Usuario -->
<div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header modal-header-custom">
                <h5 class="modal-title">Editar Usuario</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-2">
                    <label>Nombre</label>
                    <input type="text" id="editNombre" class="form-control" required>
                </div>
                <div class="mb-2">
                    <label>Email</label>
                    <input type="email" id="editEmail" class="form-control" required>
                </div>
                <div class="mb-2">
                    <label>Rol</label>
                    <select id="editRol" class="form-select">
                        <option value="estudiante">Estudiante</option>
                        <option value="docente">Docente</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <div id="editCarreraDiv" style="display:none;">
                    <div class="mb-2">
                        <label>Carrera</label>
                        <input type="text" id="editCarrera" class="form-control">
                    </div>
                </div>
                <div id="editDepartamentoDiv" style="display:none;">
                    <div class="mb-2">
                        <label>Departamento</label>
                        <input type="text" id="editDepartamento" class="form-control">
                    </div>
                </div>
                <div class="mb-2">
                    <label>Teléfono</label>
                    <input type="text" id="editTelefono" class="form-control">
                </div>
                <div class="mb-2 form-check">
                    <input type="checkbox" id="editActivo" class="form-check-input">
                    <label class="form-check-label">Activo</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnGuardarEdicion">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Cambiar Contraseña -->
<div class="modal fade" id="modalPassword" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header modal-header-custom">
                <h5 class="modal-title">Cambiar Contraseña</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="passId">
                <div class="mb-2">
                    <label>Nueva Contraseña</label>
                    <input type="password" id="nuevaPassword" class="form-control" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-warning" id="btnGuardarPassword">Cambiar Contraseña</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    let usuarioActual = null;

    function mostrarMensaje(texto, esError = false) {
        const msgDiv = document.getElementById('mensaje');
        msgDiv.textContent = texto;
        msgDiv.className = `mensaje-flotante ${esError ? 'mensaje-error' : ''}`;
        msgDiv.style.display = 'block';
        setTimeout(() => msgDiv.style.display = 'none', 3000);
    }

    async function cargarUsuarios() {
        try {
            const res = await fetch('/usuarios', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) throw new Error('Error al obtener usuarios');
            const usuarios = await res.json();
            if (usuarios.length === 0) {
                document.getElementById('tablaUsuarios').innerHTML = '<div class="alert alert-info">No hay usuarios registrados.</div>';
                return;
            }
            let html = `
                <table class="tabla">
                    <thead>
                        <tr><th>ID</th><th>Código</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th><th>Acciones</th></tr>
                    </thead>
                    <tbody>
            `;
            for (const u of usuarios) {
                html += `
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.codigo}</td>
                        <td>${u.nombre}</td>
                        <td>${u.email}</td>
                        <td>${u.rol}</td>
                        <td>${u.activo ? 'Sí' : 'No'}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="abrirEditar(${u.id})">Editar</button>
                            <button class="btn btn-sm btn-cambiar-pw" onclick="abrirCambiarPassword(${u.id})">Cambiar PW</button>
                            <button class="btn btn-sm btn-danger" onclick="eliminarUsuario(${u.id})">Eliminar</button>
                        </td>
                    </tr>
                `;
            }
            html += `</tbody></table>`;
            document.getElementById('tablaUsuarios').innerHTML = html;
        } catch (error) {
            document.getElementById('tablaUsuarios').innerHTML = `<div class="alert alert-danger">Error al cargar usuarios: ${error.message}</div>`;
        }
    }

    window.abrirEditar = async (id) => {
        try {
            const res = await fetch('/usuarios', { headers: { 'Authorization': 'Bearer ' + token } });
            const usuarios = await res.json();
            const user = usuarios.find(u => u.id == id);
            if (!user) return;
            document.getElementById('editId').value = user.id;
            document.getElementById('editNombre').value = user.nombre;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editRol').value = user.rol;
            document.getElementById('editCarrera').value = user.carrera || '';
            document.getElementById('editDepartamento').value = user.departamento || '';
            document.getElementById('editTelefono').value = user.telefono || '';
            document.getElementById('editActivo').checked = user.activo == 1;

            // Mostrar campos según rol
            const rol = user.rol;
            document.getElementById('editCarreraDiv').style.display = rol === 'estudiante' ? 'block' : 'none';
            document.getElementById('editDepartamentoDiv').style.display = rol === 'docente' ? 'block' : 'none';

            new bootstrap.Modal(document.getElementById('modalEditar')).show();
        } catch (error) {
            mostrarMensaje('Error al cargar datos del usuario', true);
        }
    };

    document.getElementById('btnGuardarEdicion').addEventListener('click', async () => {
        const id = document.getElementById('editId').value;
        const rol = document.getElementById('editRol').value;
        const data = {
            nombre: document.getElementById('editNombre').value,
            email: document.getElementById('editEmail').value,
            rol: rol,
            carrera: rol === 'estudiante' ? document.getElementById('editCarrera').value : null,
            departamento: rol === 'docente' ? document.getElementById('editDepartamento').value : null,
            telefono: document.getElementById('editTelefono').value,
            activo: document.getElementById('editActivo').checked ? 1 : 0
        };
        try {
            const res = await fetch(`/usuarios/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (res.ok) {
                mostrarMensaje(result.mensaje);
                bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
                cargarUsuarios();
            } else {
                mostrarMensaje(result.mensaje || 'Error al actualizar', true);
            }
        } catch (error) {
            mostrarMensaje('Error de conexión', true);
        }
    });

    window.abrirCambiarPassword = (id) => {
        document.getElementById('passId').value = id;
        document.getElementById('nuevaPassword').value = '';
        new bootstrap.Modal(document.getElementById('modalPassword')).show();
    };

    document.getElementById('btnGuardarPassword').addEventListener('click', async () => {
        const id = document.getElementById('passId').value;
        const nuevaPassword = document.getElementById('nuevaPassword').value;
        if (!nuevaPassword) {
            mostrarMensaje('Ingrese una nueva contraseña', true);
            return;
        }
        try {
            const res = await fetch(`/usuarios/${id}/cambiar-password`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ password: nuevaPassword })
            });
            const result = await res.json();
            if (res.ok) {
                mostrarMensaje(result.mensaje);
                bootstrap.Modal.getInstance(document.getElementById('modalPassword')).hide();
            } else {
                mostrarMensaje(result.mensaje || 'Error al cambiar contraseña', true);
            }
        } catch (error) {
            mostrarMensaje('Error de conexión', true);
        }
    });

    window.eliminarUsuario = async (id) => {
        if (!confirm('¿Eliminar este usuario permanentemente?')) return;
        try {
            const res = await fetch(`/usuarios/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const result = await res.json();
            if (res.ok) {
                mostrarMensaje(result.mensaje);
                cargarUsuarios();
            } else {
                mostrarMensaje(result.mensaje || 'Error al eliminar', true);
            }
        } catch (error) {
            mostrarMensaje('Error de conexión', true);
        }
    };

    cargarUsuarios();
</script>
</body>
</html>
