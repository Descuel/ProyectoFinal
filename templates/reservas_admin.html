<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/edificios.css') }}">
    <style>
        .estado-pendiente { background-color: #fff3cd; color: #856404; padding: 5px 10px; border-radius: 20px; display: inline-block; }
        .btn-aprobar { background-color: #28a745; color: white; border: none; padding: 5px 12px; border-radius: 5px; margin-right: 5px; cursor: pointer; }
        .btn-rechazar { background-color: #dc3545; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        .mensaje-flotante { position: fixed; top: 20px; right: 20px; padding: 12px 20px; background: #4CAF50; color: white; border-radius: 5px; z-index: 1000; display: none; }
        .mensaje-error { background: #f44336; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo">Sistema de Laboratorios</div>
    <button class="volver" onclick="window.location.href='/dashboard'">Volver</button>
</nav>
<main class="contenedor">
    <section class="titulo">
        <h1>Gestión de Reservas</h1>
        <p>Administrar todas las reservas de laboratorios.</p>
    </section>
    <div id="mensaje" class="mensaje-flotante"></div>
    <section class="tabla" id="tablaReservas">
        <div class="text-center">Cargando reservas...</div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    function mostrarMensaje(texto, esError = false) {
        const msgDiv = document.getElementById('mensaje');
        msgDiv.textContent = texto;
        msgDiv.className = `mensaje-flotante ${esError ? 'mensaje-error' : ''}`;
        msgDiv.style.display = 'block';
        setTimeout(() => msgDiv.style.display = 'none', 3000);
    }

    function formatearFecha(fechaStr) {
        if (!fechaStr) return '';
        const fecha = new Date(fechaStr);
        return fecha.toISOString().split('T')[0];
    }

    function formatearHora(horaStr) {
        if (!horaStr) return '';
        let hora = horaStr.toString();
        if (hora.includes(':')) {
            let partes = hora.split(':');
            return `${partes[0].padStart(2,'0')}:${partes[1].padStart(2,'0')}:${(partes[2] || '00').padStart(2,'0')}`;
        }
        return hora;
    }

    async function cargarReservas() {
        try {
            const response = await fetch('/reservas', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!response.ok) throw new Error('Error al obtener reservas');
            const reservas = await response.json();

            if (reservas.length === 0) {
                document.getElementById('tablaReservas').innerHTML = '<div class="alert alert-info">No hay reservas registradas.</div>';
                return;
            }

            let html = `<table class="tabla"><thead><tr><th>ID</th><th>Laboratorio ID</th><th>Usuario ID</th><th>Fecha</th><th>Hora Inicio</th><th>Hora Fin</th><th>Motivo</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>`;
            for (const r of reservas) {
                const fecha = formatearFecha(r.fecha);
                const horaInicio = formatearHora(r.hora_inicio);
                const horaFin = formatearHora(r.hora_fin);
                let estadoHtml = '';
                if (r.estado === 'pendiente') estadoHtml = '<span class="estado-pendiente">Pendiente</span>';
                else if (r.estado === 'aprobada') estadoHtml = '<span class="badge bg-success">Aprobada</span>';
                else estadoHtml = '<span class="badge bg-danger">Rechazada</span>';

                html += `<tr>
                    <td>${r.id}</td>
                    <td>${r.laboratorio_id}</td>
                    <td>${r.usuario_id}</td>
                    <td>${fecha}</td>
                    <td>${horaInicio}</td>
                    <td>${horaFin}</td>
                    <td>${r.motivo || '-'}</td>
                    <td>${estadoHtml}</td>
                    <td>${r.estado === 'pendiente' ? `<button class="btn-aprobar" data-id="${r.id}" data-accion="aprobar">Aprobar</button> <button class="btn-rechazar" data-id="${r.id}" data-accion="rechazar">Rechazar</button>` : (r.estado === 'aprobada' ? '✔ Aprobada' : '✘ Rechazada')}</td>
                </tr>`;
            }
            html += `</tbody></table>`;
            document.getElementById('tablaReservas').innerHTML = html;

            // Asignar eventos a los botones generados
            document.querySelectorAll('.btn-aprobar').forEach(btn => {
                btn.addEventListener('click', () => aprobarReserva(parseInt(btn.dataset.id)));
            });
            document.querySelectorAll('.btn-rechazar').forEach(btn => {
                btn.addEventListener('click', () => prepararRechazo(parseInt(btn.dataset.id)));
            });
        } catch (error) {
            document.getElementById('tablaReservas').innerHTML = `<div class="alert alert-danger">Error al cargar reservas: ${error.message}</div>`;
        }
    }

    async function aprobarReserva(id) {
        if (!confirm('¿Aprobar esta reserva?')) return;
        await actualizarEstadoReserva(id, 'aprobada', '');
    }

    async function prepararRechazo(id) {
        const comentario = prompt("Motivo del rechazo:");
        if (comentario === null) return; // Canceló
        if (comentario.trim() === "") {
            alert("Debe ingresar un motivo para el rechazo");
            return;
        }
        await actualizarEstadoReserva(id, 'rechazada', comentario);
    }

    async function actualizarEstadoReserva(id, nuevoEstado, comentario) {
        try {
            const response = await fetch(`/reservas/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ estado: nuevoEstado, comentario_admin: comentario })
            });
            const data = await response.json();
            if (response.ok) {
                mostrarMensaje(data.mensaje);
                cargarReservas(); // Recargar tabla
            } else {
                mostrarMensaje(data.mensaje || 'Error al actualizar', true);
            }
        } catch (error) {
            mostrarMensaje('Error de conexión', true);
        }
    }

    cargarReservas();
</script>
</body>
</html>
