<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h1>S.I.G.L.I.</h1>
        <p class="subtitulo">Ingrese sus credenciales para acceder al sistema</p>

        <form id="loginForm">
            <label for="username"> Usuario</label>
            <input type="text" id="username" name="username" placeholder="Ej: ADMIN001, DOC001, 20240001" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>

            <button type="button" onclick="login()">Iniciar Sesión</button>
        </form>

        <!-- ========== ENLACE DE REGISTRO ========== -->
        <!-- Agrega este bloque justo después del botón y antes del div de mensaje -->
        <div class="text-center" style="margin-top: 15px;">
            <a href="/registro" class="text-decoration-none">¿No tienes una cuenta? Regístrate aquí</a>
        </div>
        <!-- ======================================== -->

        <div id="mensaje"></div>
    </div>
</div>

<script>
function login() {
    const codigo = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const mensajeDiv = document.getElementById("mensaje");

    fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ codigo: codigo, password: password })
    })
    .then(res => res.json().then(data => ({ status: res.status, data: data })))
    .then(resultado => {
        if (resultado.status === 200) {
            // Guardar token y rol en localStorage
            localStorage.setItem("token", resultado.data.token);
            localStorage.setItem("rol", resultado.data.rol);  // guarda el rol para otros usos
            mensajeDiv.innerHTML = "Inicio de sesión correcto";
            mensajeDiv.className = "mensaje-exito";

            // Redirige según el rol del usuario
            setTimeout(() => {
                if (resultado.data.rol === 'admin') {
                    window.location.href = "/dashboard";
                } else {
                    // estudiantes y docentes van al dashboard de usuario
                    window.location.href = "/dashboard-usuario";
                }
            }, 1000);
        } else {
            mensajeDiv.innerHTML = resultado.data.mensaje;
            mensajeDiv.className = "mensaje-error";
        }
    })
    .catch(error => {
        console.error(error);
        mensajeDiv.innerHTML = "Error al conectar con el servidor";
        mensajeDiv.className = "mensaje-error";
    });
}
</script>
</body>
</html>
